modules:
  - id: plugin-setup
    purpose: Установить плагин в среду OpenClaw и подготовить инфраструктуру для работы координатора и субагента-researcher.
    input: Репозиторий плагина, конфигурация OpenClaw
    output: Настроенная среда — конфиг, workspace субагента, индекс исследований
    steps:
      - id: install
        body_markdown: |
          Пользователь клонирует репозиторий плагина в директорию расширений OpenClaw (`~/.openclaw/extensions/`) и активирует его через CLI.

          После активации OpenClaw узнаёт о плагине, но среда ещё не готова — нужен `setup`.
        links:
          - to: configure

      - id: configure
        body_markdown: |
          Команда `setup` обновляет `openclaw.json` — главный конфиг платформы:

          - Регистрирует субагента `researcher` в списке агентов
          - Разрешает главному агенту (координатору) запускать `researcher` через `allowAgents`
          - Добавляет `exec` в список разрешённых инструментов субагентов
          - Увеличивает лимит символов промпта до 40000 (промпт researcher-а большой)
          - Устанавливает время жизни сессий субагентов на ~1 год, чтобы можно было продолжить исследование спустя время
          - Гарантирует запись плагина в `plugins.entries`

          Патч идемпотентен — безопасно запускать повторно.
        links:
          - to: assemble-prompt

      - id: assemble-prompt
        body_markdown: |
          Сборка системного промпта субагента-researcher из модульных markdown-блоков.

          Базовый промпт содержит три плейсхолдера: `{{TOOLS}}`, `{{CASCADES}}`, `{{EXPERIENCE}}`.

          Подстановка `{{TOOLS}}`:
          - Для каждого включённого инструмента читается его markdown-документация из `assets/tools/`
          - Выключенные инструменты пропускаются

          Подстановка `{{CASCADES}}`:
          - Деревья решений по выбору инструментов загружаются из `cascades.md`
          - Строки с упоминаниями выключенных инструментов вырезаются

          Подстановка `{{EXPERIENCE}}`:
          - Инструкции по ведению experience-лога включаются всегда

          Собранный промпт записывается как `AGENTS.md` в workspace субагента. Рядом создаётся служебный `TOOLS.md`.

          Доступные инструменты (все включены по умолчанию, управляются через конфиг плагина):
          - Exa — семантический поиск, crawling, deep research
          - ScrapFly — anti-bot scraping, скриншоты, LLM extraction
          - Brave — keyword-поиск
          - Ref — поиск и чтение технической документации
          - agent-browser — автоматизация браузера
          - 1Password — управление учётными данными
        links:
          - to: create-index

      - id: create-index
        body_markdown: |
          Создание пустого `INDEX.md` — реестра всех исследований.

          Индекс содержит записи по каждому исследованию: дата, статус, сводка, путь к файлам, sessionKey для продолжения.

          Создаётся только если файла ещё нет.
        links:
          - to: verify

      - id: verify
        body_markdown: |
          Команда `status` проверяет корректность установки и показывает галочки/крестики для каждого компонента.

          Проверки конфигурации:
          - Агент `researcher` зарегистрирован
          - `researcher` в `allowAgents` координатора
          - `exec` в списке разрешённых инструментов
          - Запись плагина существует

          Проверки файлов:
          - SKILL.md координатора на месте
          - `AGENTS.md` и `TOOLS.md` в workspace researcher-а
          - `INDEX.md` существует

  - id: research-coordination
    purpose: Управлять жизненным циклом исследования — от запроса пользователя до финального результата. Исполнитель — координатор (главный агент OpenClaw).
    depends_on:
      - plugin-setup
    steps:
      - id: gather-context
        body_markdown: |
          Координатор собирает контекст перед составлением brief:

          - Читает `INDEX.md` — сводки всех прошлых исследований
          - Ищет связанные файлы в рабочей директории
          - Проверяет папку `experience/` — накопленный опыт по релевантным сайтам и темам
          - Учитывает контекст текущего разговора с пользователем
        links:
          - to: compose-brief

      - id: compose-brief
        body_markdown: |
          Формулировка задания для исследования:

          - Тема в одну строку
          - Что уже известно (факты из контекста)
          - Список конкретных вопросов с ожидаемыми deliverables
          - Ожидаемый формат результата (таблица, список, сравнение, инструкция)

          Предварительные ответы на вопросы — только при наличии обоснованных предположений. Не угадывать.
        links:
          - to: discuss-brief

      - id: discuss-brief
        body_markdown: |
          Обсуждение brief с пользователем.

          Между составлением brief и запуском может пройти целый разговор — пользователь уточняет вопросы, добавляет направления, корректирует ожидания.

          Координатор показывает:
          - Составленный brief
          - Модель и уровень thinking (по умолчанию `gpt-5.4`, `xhigh`)

          **Запуск только после явного подтверждения** — «ок», «давай», «запускай».
        links:
          - to: determine-type

      - id: determine-type
        body_markdown: |
          Определение типа исследования:
          - **Новое** — тема исследуется впервые
          - **Продолжение** — есть предыдущее исследование, нужно углубить или расширить
        links:
          - to: create-files
            condition: новое исследование
          - to: continue-via-session
            condition: продолжение, сессия жива
          - to: continue-via-spawn
            condition: продолжение, сессия недоступна

      - id: create-files
        body_markdown: |
          Создание файлов для нового исследования в `/research/<slug>/`:

          - `research.md` — шаблон с brief, пустыми секциями для Rolling Summary, Key Findings, Sources, Open Questions, Log
          - `progress.md` — пустой файл, канал связи между координатором и субагентом
        links:
          - to: update-index-start

      - id: update-index-start
        body_markdown: |
          Добавить запись в `INDEX.md` со статусом «в процессе».
        links:
          - to: spawn-researcher

      - id: spawn-researcher
        body_markdown: |
          Запуск субагента-researcher через `sessions_spawn`.

          Задание включает:
          - Тему и brief
          - Пути к `research.md`, `progress.md`, папке experience
          - Опционально: режим extraction (`BROWSER_FIRST`), дополнительный контекст, follow-up инструкции

          Параметры: агент `researcher`, таймаут 2 часа, сессия сохраняется после завершения.
        links:
          - to: monitor-progress

      - id: monitor-progress
        body_markdown: |
          Координатор следит за `progress.md`, где субагент оставляет записи.

          Типы записей:
          - `PLAN` — субагент опубликовал план исследования
          - `PROGRESS` — обновление о находках (каждые 3-5 результатов)
          - `QUESTION` — неблокирующий вопрос, субагент продолжает работать
          - `CLARIFICATION` — блокирующий вопрос, субагент ждёт ответа
          - `FINAL` — исследование завершено
        links:
          - to: handle-clarification
            condition: субагент написал CLARIFICATION
          - to: send-command
            condition: пользователь хочет вмешаться
          - to: handle-completion
            condition: получен FINAL или announce

      - id: handle-clarification
        body_markdown: |
          Субагент заблокирован и ждёт ответа.

          - Показать пользователю вопросы (с предварительными ответами субагента)
          - Получить ответ от пользователя
          - Дописать `COMMAND ANSWER: <ответ>` в `progress.md`

          Субагент обнаружит ответ при следующей проверке и продолжит работу.
        links:
          - to: monitor-progress

      - id: send-command
        body_markdown: |
          Координатор может вмешаться в работу субагента, дописав команду в `progress.md`:

          - `COMMAND STOP` — немедленная остановка исследования
          - `COMMAND REFOCUS: <направление>` — смена фокуса
          - `COMMAND ADD_QUESTION: <вопрос>` — добавить вопрос к исследованию
          - `COMMAND ANSWER: <ответ>` — ответ на вопрос субагента
        links:
          - to: monitor-progress
            condition: продолжение мониторинга
          - to: handle-completion
            condition: отправлен STOP

      - id: handle-completion
        body_markdown: |
          Завершение исследования:

          - Прочитать `research.md` с полными результатами
          - Показать пользователю краткое резюме
          - Предложить прочитать полный файл или задать вопросы
          - Обновить `INDEX.md`: статус «завершён», сводка из Rolling Summary, путь к файлам, **sessionKey из announce**

          Запись sessionKey критически важна — без неё продолжение исследования через `sessions_send` невозможно.

      - id: continue-via-session
        body_markdown: |
          Основной способ продолжения исследования.

          Сессии субагентов живут ~1 год. Координатор:
          - Находит sessionKey в `INDEX.md`
          - Обсуждает с пользователем новый brief
          - Отправляет `sessions_send` с новым заданием — субагент просыпается с полным контекстом предыдущей работы
          - Обновляет `INDEX.md`: статус «в процессе»
        links:
          - to: monitor-progress

      - id: continue-via-spawn
        body_markdown: |
          Fallback, когда сессия недоступна (gateway потерял запись после рестарта).

          - Новый `sessions_spawn` с follow-up заданием
          - В задании — ссылка на `research.md` базового исследования
          - Субагент читает предыдущие результаты и продолжает с них
          - Источники из базового исследования маркируются `[BASE-S#]`, новые — `[S1]`, `[S2]`, ...
          - Обновить `INDEX.md`: новый sessionKey, статус «в процессе»
        links:
          - to: monitor-progress

  - id: research-execution
    purpose: Провести автономное глубокое исследование по заданной теме. Исполнитель — субагент-researcher, работающий в адаптивном цикле think-act.
    depends_on:
      - plugin-setup
    steps:
      - id: understand-assignment
        body_markdown: |
          Субагент начинает с понимания задания:

          - Прочитать `research.md` — тему и brief
          - Если follow-up — прочитать базовое исследование
          - Оценить: всё ли понятно, есть ли двусмысленности
        links:
          - to: clarify-assignment
            condition: есть вопросы или неясности
          - to: plan-research
            condition: задание понятно

      - id: clarify-assignment
        body_markdown: |
          Субагент записывает `CLARIFICATION` в `progress.md`:
          - Формулирует вопросы со своими предварительными ответами
          - Останавливается и ожидает ответа координатора
          - Каждые ~30 секунд перечитывает `progress.md`, ищет `COMMAND ANSWER`
          - Получив ответ — записывает `ACK` и корректирует план
        links:
          - to: plan-research

      - id: plan-research
        body_markdown: |
          Записать `PLAN` в `progress.md` с направлениями исследования и перейти к основному циклу.
        links:
          - to: think-act-cycle

      - id: think-act-cycle
        body_markdown: |
          Основной цикл работы — свободный, без фиксированного маршрута. После каждого действия субагент анализирует результат и выбирает следующее.

          Перед каждым шагом: «что я сейчас знаю, чего не знаю, и какое действие принесёт больше всего пользы?»

          Доступные действия:
          - **Поиск** — найти источники через Exa (семантический), Brave (keyword), Ref (документация)
          - **Извлечение** — прочитать страницу по URL, используя каскад инструментов от лёгких к тяжёлым
          - **Браузер** — интерактивная работа с сайтом (формы, навигация, SPA)
          - **Делегирование** — отправить подтему Exa Deep Researcher (параллельный AI-агент, только для вспомогательных подтем)
          - **Запись** — зафиксировать находки в `research.md`
        links:
          - to: record-findings
          - to: check-stop
            condition: получена команда STOP

      - id: record-findings
        body_markdown: |
          Каждые 3-5 значимых находок — обновить `research.md`:
          - Key Findings — с ссылками `[S#]` на источники
          - Sources — URL каждого источника
          - Rolling Summary — краткая сводка текущих результатов
          - Open Questions — что осталось невыясненным
          - Log — хронология действий

          Каждое нетривиальное утверждение подкреплено ссылкой. Сверка из нескольких источников.

          После обновления — записать `PROGRESS` в `progress.md` и проверить команды координатора.
        links:
          - to: check-commands

      - id: check-commands
        body_markdown: |
          Перечитать `progress.md` целиком, искать `COMMAND` без парного `ACK`.

          - `COMMAND STOP` — немедленное завершение
          - `COMMAND REFOCUS: <направление>` — сменить фокус, скорректировать план
          - `COMMAND ADD_QUESTION: <вопрос>` — добавить к исследованию
          - `COMMAND ANSWER: <ответ>` — обработать ответ координатора

          После обработки — записать `ACK`.
        links:
          - to: think-act-cycle
            condition: исследование продолжается
          - to: evaluate-completion
            condition: получен STOP или все вопросы закрыты

      - id: evaluate-completion
        body_markdown: |
          Проверка критериев завершения:
          - Команда `STOP` от координатора
          - Все вопросы из brief закрыты, подкреплены источниками и фактами
          - Насыщение — новые поиски не дают релевантных результатов

          Субагент не ограничивает себя количеством циклов. Если есть что исследовать — продолжает.
        links:
          - to: think-act-cycle
            condition: критерии не выполнены
          - to: write-experience
            condition: исследование завершено

      - id: write-experience
        body_markdown: |
          Перед финализацией — записать опыт в папку `experience/`.

          Файлы организованы по доменам или темам (субагент сам выбирает имя). Содержание:
          - Проблемы и решения — что не работало с конкретными сайтами и какой инструмент сработал
          - Рекомендации для будущих агентов — какой инструмент использовать сразу
          - Наблюдения — что стоит улучшить в логике, промпте или каскадах
        links:
          - to: finalize

      - id: finalize
        body_markdown: |
          Завершение работы субагента:
          - Записать `FINAL` в `progress.md` с резюме в 3-5 предложений
          - В announce — краткое сообщение координатору: что нашёл, главный вывод

      - id: check-stop
        body_markdown: |
          Немедленное завершение по команде `STOP`.
          Записать `ACK`, перейти к финализации без записи experience.
        links:
          - to: finalize
